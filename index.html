<!-- HTML (Hypertexxt Markup Languaje) es un lengudaje de etiquetas. Con HTML podemos "escribir" las páginas web. Es un lenguaje sencillo, en el que no hay variables, interpretado, cuyas instrucciones reciben el nombre de etiquetas y permite escribir hipertexto (los elementos de la páginaweb) -->

<!-- Las etiquetas tienen la siguente estructura <p>[Contenidode la etiqueta]</p>, la primera "p" abre y la segunda que tiene el slash lo cierra. -->

<!-- Esta es la estructura básica del HTML -->
 <!DOCTYPE html>
 <html lang="es-mx">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style></style>
    <link rel="stylesheet" href="">
    <title>Media técnica</title>
 </head>
 <body>
    <div style="background-color: aqua; padding: 20px;">.
        <h1>Mi primera web</h1>
        <p>Este es un <br> parrafo de <strong>ejemplo</strong></p>
        <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer">URL Instagram</a>
    </div>
 </body>
 </html>
